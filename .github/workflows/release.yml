name: Build and Release Portable App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to create, for example v0.1.1
        required: true
        type: string
      release_name:
        description: Optional release title
        required: false
        type: string
      prerelease:
        description: Mark the GitHub release as prerelease
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4.4.0
        with:
          version: 10.30.3
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Resolve release metadata
        id: release_meta
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $tag = '${{ inputs.release_tag }}'
            $name = '${{ inputs.release_name }}'
            if ([string]::IsNullOrWhiteSpace($name)) {
              $name = $tag
            }
            $isPrerelease = '${{ inputs.prerelease }}'
          }
          else {
            $tag = '${{ github.ref_name }}'
            $name = $tag
            $isPrerelease = 'false'
          }

          $archiveName = "opencode-provider-editor-$tag-portable-win-x64.zip"

          "release_tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "release_name=$name" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "release_prerelease=$isPrerelease" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "archive_name=$archiveName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "archive_path=release/$archiveName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build portable app without local config
        shell: pwsh
        run: |
          $env:SKIP_LOCAL_CONFIG_COPY = 'true'
          pnpm run dist:portable

      - name: Create release archive
        shell: pwsh
        run: |
          Compress-Archive -Path 'release/portable-win-x64/*' -DestinationPath '${{ steps.release_meta.outputs.archive_path }}' -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.release_meta.outputs.archive_name }}
          path: ${{ steps.release_meta.outputs.archive_path }}
          if-no-files-found: error

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.release_tag }}
          RELEASE_NAME: ${{ steps.release_meta.outputs.release_name }}
          RELEASE_PRERELEASE: ${{ steps.release_meta.outputs.release_prerelease }}
          ARCHIVE_PATH: ${{ steps.release_meta.outputs.archive_path }}
        shell: pwsh
        run: |
          $commonArgs = @($env:RELEASE_TAG, $env:ARCHIVE_PATH, '--repo', '${{ github.repository }}', '--title', $env:RELEASE_NAME, '--generate-notes')
          if ($env:RELEASE_PRERELEASE -eq 'true') {
            $commonArgs += '--prerelease'
          }

          gh release view $env:RELEASE_TAG --repo '${{ github.repository }}' *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $env:RELEASE_TAG $env:ARCHIVE_PATH --repo '${{ github.repository }}' --clobber
          }
          else {
            gh release create @commonArgs
          }
